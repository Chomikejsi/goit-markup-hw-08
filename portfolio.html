<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moja Strona</title>
  
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="container">
      <h2>Moja Strona</h2>
    </div>
  </nav>

  <!-- HERO -->
  <section id="hero">
    <div class="container">
      <h1>Witaj na mojej stronie</h1>
      <p>Prosty projekt front-end do pokazania umiejętności.</p>
      <img src="images/hero.jpg" alt="Hero image">
    </div>
  </section>

  <!-- PROJEKTY -->
  <section id="projects">
    <div class="container">
      <h2>Projekty</h2>
      <div class="project-item">
        <img src="images/project1.jpg" alt="Projekt 1">
        <h3>Projekt 1</h3>
        <p>Opis projektu 1.</p>
      </div>
      <div class="project-item">
        <img src="images/project2.jpg" alt="Projekt 2">
        <h3>Projekt 2</h3>
        <p>Opis projektu 2.</p>
      </div>
    </div>
  </section>

  <!-- ZESPÓŁ -->
  <section id="team">
    <div class="container">
      <h2>Zespół</h2>
      <div class="team-member">
        <img src="images/team1.jpg" alt="Członek zespołu">
        <h3>Jan Kowalski</h3>
        <p>Front-end Developer</p>
      </div>
      <div class="team-member">
        <img src="images/team2.jpg" alt="Członek zespołu">
        <h3>Anna Nowak</h3>
        <p>Designer</p>
      </div>
    </div>
  </section>

</body>
</html>
